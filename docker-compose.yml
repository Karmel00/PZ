services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: notesync
      POSTGRES_USER: notesync
      POSTGRES_PASSWORD: notesync
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notesync -d notesync"]
      interval: 3s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://notesync:notesync@db:5432/notesync
      JWT_SECRET: local-dev-secret
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "uvicorn app.main:app --host 0.0.0.0 --port 8000"

  pwa:
    build:
      context: ./pwa
      args:
        VITE_API_URL: http://localhost:8000
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data: